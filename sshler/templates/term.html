
{% extends "base.html" %}
{% block content %}
<div class="term-page">
  <div>
    <h1>{{ box.name }} — Terminal</h1>
    <div class="term-meta">
      <span>Dir: <span class="mono">{{ directory }}</span> • Session: <span class="mono">{{ session }}</span></span>
      <div class="actions">
        <a class="btn secondary small" href="/box/{{ box.name }}">Back</a>
      </div>
    </div>
  </div>
  <div class="term-wrapper">
    <div id="term" class="term"></div>
  </div>
</div>
<link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
<script src="https://unpkg.com/xterm/lib/xterm.js"></script>
<script>
  const term = new Terminal({cursorBlink: true, convertEol: true});
  term.open(document.getElementById('term'));
  const url = new URL(window.location.href);
  const host = url.searchParams.get('host');
  const dir = url.searchParams.get('dir');
  const session = url.searchParams.get('session') || '{{ session }}';
  const cols = {{ cols }}; const rows = {{ rows }};
  const wsProto = (location.protocol === 'https:' ? 'wss://' : 'ws://');
  const wsUrl = wsProto + location.host + `/ws/term?host=${encodeURIComponent(host)}&dir=${encodeURIComponent(dir)}&session=${encodeURIComponent(session)}&cols=${cols}&rows=${rows}`;
  const ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    term.focus();
  };
  ws.onmessage = (ev) => {
    if (ev.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(ev.data));
    } else {
      term.write(ev.data);
    }
  };
  ws.onclose = () => {
    term.write('\r\n\x1b[31m[Connection closed — refresh to reconnect]\x1b[0m\r\n');
  };
  const encoder = new TextEncoder();
  term.onData(d => {
    ws.send(encoder.encode(d));
  });

  term.attachCustomKeyEventHandler(ev => {
    if (ev.ctrlKey && ev.key && ev.key.toLowerCase() === 't') {
      ws.send(encoder.encode(String.fromCharCode(20)));
      ev.preventDefault();
      return false;
    }
    return true;
  });

  window.addEventListener('resize', () => {
    term.fit?.();
  });
</script>
{% endblock %}
