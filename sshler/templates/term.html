
{% extends "base.html" %}
{% block head_extra %}
<link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
<script src="https://unpkg.com/xterm/lib/xterm.js"></script>
<script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
{% endblock %}
{% block content %}
<div class="term-page">
  <div class="term-header">
    <div>
      <h1>{{ box.name }} — Terminal</h1>
      <div class="term-meta">
        <span>Dir: <span class="mono">{{ directory }}</span> • Session: <span class="mono">{{ session }}</span></span>
      </div>
    </div>
    <div class="term-actions">
      <a class="btn secondary small" href="/box/{{ box.name }}">Back</a>
    </div>
  </div>
  <div id="tmux-tabs" class="tmux-tabs"></div>
  <div class="term-shell">
    <div class="term-toolbar" id="term-toolbar">
      <button class="btn secondary small" data-command="ctrl-t">Ctrl+T</button>
      <button class="btn secondary small" data-command="split-h">Split %</button>
      <button class="btn secondary small" data-command="split-v">Split "</button>
      <button class="btn secondary small" data-command="new-window">New Window</button>
      <button class="btn secondary small" data-command="rename-window">Rename Window</button>
      <button class="btn secondary small" data-command="kill-pane">Kill Pane</button>
      <button class="btn secondary small" data-command="next">Next Window</button>
      <button class="btn secondary small" data-command="prev">Prev Window</button>
      <button class="btn secondary small" data-command="detach">Detach</button>
    </div>
    <div class="term-wrapper" id="term-wrapper">
      <div id="term" class="term"></div>
    </div>
    <div class="file-panel hidden" id="file-panel">
      <div id="file-browser"
           hx-get="/box/{{ box.name }}/ls?path={{ directory|urlencode }}&target=file-browser"
           hx-trigger="revealed"
           hx-target="#file-browser"
           hx-swap="innerHTML">
        <div class="muted">Loading files…</div>
      </div>
    </div>
  </div>
</div>
<script>
  document.body.classList.add('term-view');
  window.addEventListener('beforeunload', () => document.body.classList.remove('term-view'));

  const term = new Terminal({cursorBlink: true, convertEol: true, scrollback: 8000});
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('term'));
  fitAddon.fit();

  const url = new URL(window.location.href);
  const host = url.searchParams.get('host');
  const dir = url.searchParams.get('dir');
  const session = url.searchParams.get('session') || '{{ session }}';
  const wsProto = (location.protocol === 'https:' ? 'wss://' : 'ws://');
  const wsUrl = wsProto + location.host + `/ws/term?host=${encodeURIComponent(host)}&dir=${encodeURIComponent(dir)}&session=${encodeURIComponent(session)}&cols=${term.cols}&rows=${term.rows}`;
  const ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  const encoder = new TextEncoder();
  const termToolbar = document.getElementById('term-toolbar');
  const termWrapper = document.getElementById('term-wrapper');
  const filePanel = document.getElementById('file-panel');
  const fileBrowser = document.getElementById('file-browser');
  let filePanelActive = false;
  let filePanelLoaded = false;
  let latestWindows = [];
  let fileTabButton = null;

  function sendResize() {
    fitAddon.fit();
    ws.send(JSON.stringify({op: 'resize', cols: term.cols, rows: term.rows}));
  }

  ws.onopen = () => {
    term.focus();
    sendResize();
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      try {
        const message = JSON.parse(ev.data);
        if (message.op === 'windows') {
          renderTabs(message.windows);
          return;
        }
      } catch (err) {
        term.write(ev.data);
        return;
      }
      term.write(ev.data);
    } else if (ev.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(ev.data));
    }
  };

  ws.onclose = () => {
    term.write('\r\n\x1b[31m[Connection closed — refresh to reconnect]\x1b[0m\r\n');
  };

  term.onData(data => {
    ws.send(encoder.encode(data));
  });

  term.attachCustomKeyEventHandler(ev => {
    if (ev.ctrlKey && ev.key && ev.key.toLowerCase() === 't') {
      ws.send(JSON.stringify({op: 'send', data: '\u0014'}));
      return false;
    }
    return true;
  });

  window.addEventListener('resize', () => {
    sendResize();
  });

  const commandMap = {
    'ctrl-t': {type: 'send', payload: '\u0014'},
    'split-h': {type: 'send', payload: '\u0002%'},
    'split-v': {type: 'send', payload: '\u0002"'},
    'new-window': {type: 'send', payload: '\u0002c'},
    'rename-window': {type: 'operation', op: 'rename-window'},
    'kill-pane': {type: 'send', payload: '\u0002x'},
    'next': {type: 'send', payload: '\u0002n'},
    'prev': {type: 'send', payload: '\u0002p'},
    'detach': {type: 'send', payload: '\u0002d'}
  };

  document.querySelectorAll('.term-toolbar [data-command]').forEach(button => {
    button.addEventListener('click', () => {
      const command = button.dataset.command;
      const config = commandMap[command];
      if (!config) {
        return;
      }
      if (config.type === 'send') {
        ws.send(JSON.stringify({op: 'send', data: config.payload}));
      } else if (config.type === 'operation') {
        if (config.op === 'rename-window') {
          const newName = prompt('Rename window to:');
          if (newName) {
            ws.send(JSON.stringify({op: 'rename-window', target: newName}));
          }
        }
      }
    });
  });

  function activateTerminalView() {
    if (!filePanelActive) {
      return;
    }
    filePanelActive = false;
    termToolbar.classList.remove('hidden');
    termWrapper.classList.remove('hidden');
    filePanel.classList.add('hidden');
    if (fileTabButton) {
      fileTabButton.classList.remove('active');
    }
    fitAddon.fit();
  }

  function activateFileView() {
    filePanelActive = true;
    termToolbar.classList.add('hidden');
    termWrapper.classList.add('hidden');
    filePanel.classList.remove('hidden');
    if (!filePanelLoaded && window.htmx) {
      window.htmx.trigger(fileBrowser, 'revealed');
      filePanelLoaded = true;
    }
    if (fileTabButton) {
      fileTabButton.classList.add('active');
    }
  }

  function renderTabs(windows) {
    latestWindows = windows || [];
    const container = document.getElementById('tmux-tabs');
    container.innerHTML = '';
    latestWindows.forEach(windowInfo => {
      const tab = document.createElement('button');
      const isActive = windowInfo.active && !filePanelActive;
      tab.className = 'tmux-tab' + (isActive ? ' active' : '');
      tab.textContent = `${windowInfo.index}: ${windowInfo.name}`;
      tab.addEventListener('click', () => {
        activateTerminalView();
        ws.send(JSON.stringify({op: 'select-window', target: windowInfo.index}));
      });
      container.appendChild(tab);
    });

    const separator = document.createElement('span');
    separator.className = 'tmux-separator';
    separator.textContent = '|';
    container.appendChild(separator);

    const filesTab = document.createElement('button');
    filesTab.className = 'tmux-tab' + (filePanelActive ? ' active' : '');
    filesTab.textContent = 'Files';
    filesTab.addEventListener('click', () => {
      if (filePanelActive) {
        activateTerminalView();
        renderTabs(latestWindows);
      } else {
        activateFileView();
        renderTabs(latestWindows);
      }
    });
    container.appendChild(filesTab);
    fileTabButton = filesTab;
  }

  const termElement = document.getElementById('term');
  termElement.addEventListener('contextmenu', async (event) => {
    event.preventDefault();
    const selection = term.getSelection();
    if (selection) {
      try {
        await navigator.clipboard.writeText(selection);
        term.clearSelection();
      } catch (err) {
        console.warn('Clipboard copy failed', err);
      }
      return;
    }
    try {
      const text = await navigator.clipboard.readText();
      if (text) {
        ws.send(JSON.stringify({op: 'send', data: text}));
      }
    } catch (err) {
      console.warn('Clipboard paste failed', err);
    }
  });
</script>
{% endblock %}
