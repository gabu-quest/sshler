name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Detect frontend changes
        id: frontend_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(frontend/|sshler/static/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Frontend build + tests
        if: steps.frontend_changed.outputs.changed == 'true'
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm run test

      - name: Verify frontend dist
        if: steps.frontend_changed.outputs.changed == 'true'
        run: uv run python scripts/check_frontend_dist.py

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        env:
          SSHLER_CONFIG_DIR: ${{ runner.temp }}
        run: uv run pytest
